name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - dev

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:${{ github.sha }}
          build-args: |
            BUILD_SHA=${{ github.sha }}
            BUILD_TIMESTAMP=${{ github.event.head_commit.timestamp }}

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Deploy to Portainer
        uses: bignellrp/portainer-api-action@main
        with:
          portainer_url: ${{ vars.PORTAINER_URL }}
          portainer_api_key: ${{ secrets.PORTAINER_TOKEN }}
          stack_name: ${{ github.ref_name == 'main' && github.event.repository.name || format('{0}-dev', github.event.repository.name) }}
          stack_file: docker-compose.yml
          endpoint_id: 2
          action: redeploy
          prune: true
          env_vars: |
            {"BRANCH":"${{ github.ref_name }}","PORT":"${{ github.ref_name == 'main' && vars.PORTAINER_PORT_MAIN || vars.PORTAINER_PORT_DEV }}","IMAGE_TAG":"${{ github.sha }}"}