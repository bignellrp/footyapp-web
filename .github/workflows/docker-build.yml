name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - dev

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Build, Tag and Push Docker Image to GHCR
        uses: GlueOps/github-actions-build-push-containers@v0.1.3

      - name: Determine stack name from branch
        id: stack_name
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "STACK_NAME=${{ github.event.repository.name }}" >> $GITHUB_ENV
          else
            echo "STACK_NAME=${{ github.event.repository.name }}-dev" >> $GITHUB_ENV
          fi

      - name: Deploy to Portainer
        uses: bignellrp/portainer-api-action@main
        with:
          portainer_url: ${{ vars.PORTAINER_URL }}
          portainer_api_key: ${{ secrets.PORTAINER_TOKEN }}
          stack_name: ${{ env.STACK_NAME }}
          stack_file: docker-compose.yml
          endpoint_id: 2
          action: redeploy
          prune: true